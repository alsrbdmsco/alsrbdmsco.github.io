<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — 페이지를 찾을 수 없습니다 | 1nfra</title>
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#f5f3ee">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="assets/css/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400,500,600;1,9..144,400,500&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="icon" type="image/x-icon" href="assets/images/favicon.ico">
  <style>
    .error {
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: flex-start; justify-content: center; max-width: 620px;
    }
    .error .code {
      font-family: var(--mono); font-size: 12px; letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--accent); margin-bottom: 24px;
    }
    .error h1 {
      font-family: var(--display); font-weight: 500; font-size: clamp(48px, 9vw, 88px);
      line-height: 1.02; letter-spacing: -0.02em; margin-bottom: 24px;
    }
    .error p { font-family: var(--display); font-size: 20px; color: var(--muted); margin-bottom: 36px; line-height: 1.5; }
    .error .actions { display: flex; gap: 28px; font-family: var(--mono); font-size: 13px; }
    .error .actions a { color: var(--accent); border-bottom: 1px solid var(--accent); padding-bottom: 3px; }
    .error .actions a.ghost { color: var(--muted); border-bottom-color: var(--line); }
    .error .actions a:hover { color: var(--fg); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="error">
      <p class="code">404 — Not Found</p>
      <h1>페이지를<br>찾을 수 없습니다</h1>
      <p>요청하신 경로가 존재하지 않거나 이동되었습니다.</p>
      <div class="actions">
        <a href="/">홈으로 →</a>
        <a class="ghost" href="mailto:mingyu@1nfra.kr">문의하기 →</a>
      </div>
    </div>
  </div>
</body>
</html>
